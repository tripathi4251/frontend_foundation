<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form webpage</title>
</head>
<body>
    <h1>Information</h1>
    <label for="fname">first name</label><br>
    <input type="text" name="fname" placeholder="please enter your first name"><br>
    <label for="lname">last name</label><br>
    <input type="text" name="lname" placeholder="please enter your last name"><br>
    <label  for="email">Email</label><br>
    <input type="email" id="email" name="email" placeholder="please enter your email"><br>
    <input type="submit" value="submit">

    <h2> select favourite language</h2>
    <input type="radio" name="language" id="html" value="HTML">
    <label for="html">HTML</label><br>
    <input type="radio" name="language" id="Css" value="CSS">
    <label for="Css">CSS</label><br>
    <input type="radio" name="language" id="javascript" value="javascript">
    <label for="javascript">javascript</label><br>
    

    <h3> select your domain</h3>
    <label for="domain">domain:</label>
    <select id="domain" name="domain">
<option value="CSE">CSE</option>
<option value="AI">AI</option>
<option value="DS">DS</option>
<option value="VLSI">VLSI</option>
    </select><br>
    <br>
    <h3>give your feedback</h3>
<label for="feedback">feedback</label><br>
<br>

    <textarea name="feedback" placeholder="please enter the feedback" cols="30" rows="10"></textarea> 

</body>
</html>
