<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student registration form</title>
</head>
<body style="background-color: lightskyblue;">
    <form>
        <header>
            <h1>
                Enter your information
            </h1>
        </header>
    <label for="name" style="font-size: 20px;">NAME:</label><br>
    <input type="text" id="name" placeholder="please enter your name" style="font-size: 20px;"><br>
    <label for="email" style="font-size: 20px;">Email:</label><br>
    <input type="email" id="email" placeholder="please enter your email" style="font-size: 20px;"><br>
    <br>
    <header>
        <h2>Select your gender</h2>
    </header>
    <input type="radio" name="male" value="male" id="gender" style="font-size: 30px;">
    <label for="gender" style="font-size: 20px;">Male</label><br>
    <input type="radio" name="female" value="female" id="gender">
    <label for="gender" style="font-size: 20px;">Female</label><br>
<br>
    <label for="course" style="font-size: 30px;"> course:</label>
<select id="course" name="course" style="font-size: 20px;">
    <option value="CSE" style="color: red;">CSE</option>
    <option value="AI" style="color: red;">AI</option>
    <option value="Robotics" style="color: red;">Robotics</option>
    <option value="DS" style="color: red;">DS</option>
    <option vslue="IOT" style="color: red;">IOT</option>
</select>
<br>
<br>
<button type="submit" style="font-size: 20px; color:darkgreen;">Submit</button>




</body>
</html>
